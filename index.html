<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brickster Learning Copilot — Prototype by Helena Cohee</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.7.3/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1B1F23; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, BarChart, Bar, Cell } = Recharts;

    const C = {
      brick: "#EE3D2C", dark: "#1B1F23", card: "#22272E",
      text: "#E6EDF3", muted: "#8B949E", green: "#3FB950", yellow: "#D29922",
      blue: "#58A6FF", border: "#30363D",
    };

    const hire = { name: "Priya Sharma", role: "Senior Data Engineer", team: "Platform Engineering", start: "March 24, 2026", day: 14, loc: "Bengaluru (Remote)", mgr: "Alex Chen" };

    const milestones = [
      { id: 1, label: "Day 1: Welcome & Setup", status: "complete" },
      { id: 2, label: "Day 3: Platform Foundations", status: "complete" },
      { id: 3, label: "Day 7: Team Deep Dive", status: "complete" },
      { id: 4, label: "Day 14: First Contribution", status: "active" },
      { id: 5, label: "Day 30: Manager Check-in", status: "upcoming" },
      { id: 6, label: "Day 60: Skills Assessment", status: "upcoming" },
      { id: 7, label: "Day 90: Ramp Complete", status: "upcoming" },
    ];

    const skills = [
      { name: "Spark Fundamentals", score: 85, target: 80 },
      { name: "Delta Lake", score: 60, target: 80 },
      { name: "Unity Catalog", score: 35, target: 70 },
      { name: "ML Runtime", score: 45, target: 70 },
      { name: "SQL Analytics", score: 90, target: 80 },
      { name: "Databricks Culture", score: 75, target: 80 },
    ];

    const rampData = [
      { week: "W1", score: 20, avg: 18 },
      { week: "W2", score: 42, avg: 35 },
    ];

    const recs = [
      { id: 1, icon: "\u{1F4DA}", title: "Unity Catalog Deep Dive", urgency: "high", type: "learning", reason: "Skills gap detected: 35% vs 70% target. This self-paced lab takes ~45 min and covers governance fundamentals your team uses daily." },
      { id: 2, icon: "\u{1F91D}", title: "Meet: Jordan Lee, Platform Team", urgency: "medium", type: "connection", reason: "Jordan onboarded 6 months ago in the same role. Past new hires who connected with a recent-joiner buddy ramped 22% faster." },
      { id: 3, icon: "\u26A1", title: "Submit First PR to Staging", urgency: "high", type: "action", reason: "Day 14 milestone: First Contribution. Your team's repo has 3 tagged good-first-issues. Completing one by Friday keeps you on track." },
      { id: 4, icon: "\u{1F9E0}", title: "ML Runtime Foundations", urgency: "low", type: "learning", reason: "Your role will require ML Runtime fluency by Day 60. Starting now gives you buffer. Recommended: 2 hrs/week for 4 weeks." },
    ];

    const Pill = ({ status }) => {
      const s = { complete: { bg: "rgba(63,185,80,0.15)", c: C.green, l: "Complete" }, active: { bg: "rgba(238,61,44,0.15)", c: C.brick, l: "In Progress" }, upcoming: { bg: "rgba(139,148,158,0.1)", c: C.muted, l: "Upcoming" } }[status];
      return React.createElement("span", { style: { background: s.bg, color: s.c, padding: "2px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600 } }, s.l);
    };

    const Dot = ({ l }) => {
      const c = l === "high" ? C.brick : l === "medium" ? C.yellow : C.blue;
      return React.createElement("span", { style: { width: 8, height: 8, borderRadius: "50%", background: c, display: "inline-block", marginRight: 8 } });
    };

    function App() {
      const [tab, setTab] = useState("journey");
      const [exp, setExp] = useState(null);
      const pct = Math.round((milestones.filter(m => m.status === "complete").length / milestones.length) * 100);

      return (
        <div style={{ minHeight: "100vh", background: C.dark, color: C.text, fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif" }}>

          {/* Top Bar */}
          <div style={{ background: C.card, borderBottom: `1px solid ${C.border}`, padding: "12px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 28, height: 28, background: C.brick, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#fff" }}>B</div>
              <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: 0.5 }}>Brickster Learning Copilot</span>
              <span style={{ fontSize: 10, color: C.muted, background: "rgba(238,61,44,0.1)", padding: "2px 8px", borderRadius: 4 }}>PROTOTYPE</span>
            </div>
            <div style={{ fontSize: 12, color: C.muted }}>Logged in as: <span style={{ color: C.text }}>{hire.mgr}</span> (Manager View)</div>
          </div>

          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "24px 20px" }}>

            {/* Profile Card */}
            <div style={{ background: C.card, borderRadius: 12, padding: "20px 24px", marginBottom: 20, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
              <div>
                <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>New Brickster</div>
                <div style={{ fontSize: 22, fontWeight: 700 }}>{hire.name}</div>
                <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>{hire.role} · {hire.team} · {hire.loc}</div>
                <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>Started {hire.start} · <span style={{ color: C.brick, fontWeight: 600 }}>Day {hire.day}</span></div>
              </div>
              <div style={{ display: "flex", gap: 24 }}>
                {[{ v: pct + "%", l: "Journey", c: C.brick }, { v: "42", l: "Ramp Score", c: C.green }, { v: "4", l: "AI Actions", c: C.blue }].map((s, i) => (
                  <div key={i} style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 28, fontWeight: 700, color: s.c, fontFamily: "monospace" }}>{s.v}</div>
                    <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase" }}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", gap: 4, marginBottom: 20, flexWrap: "wrap" }}>
              {[{ id: "journey", l: "Onboarding Journey" }, { id: "skills", l: "Skills & Gaps" }, { id: "copilot", l: "AI Copilot Recommendations" }].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  background: tab === t.id ? C.brick : "transparent", color: tab === t.id ? "#fff" : C.muted,
                  border: `1px solid ${tab === t.id ? C.brick : C.border}`, padding: "8px 18px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer"
                }}>{t.l}</button>
              ))}
            </div>

            {/* Journey Tab */}
            {tab === "journey" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                <div style={{ background: C.card, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, textTransform: "uppercase", letterSpacing: 1 }}>Milestone Timeline</div>
                  {milestones.map((m, i) => (
                    <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0", borderBottom: i < milestones.length - 1 ? `1px solid ${C.border}` : "none" }}>
                      <div style={{
                        width: 24, height: 24, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700,
                        background: m.status === "complete" ? C.green : m.status === "active" ? C.brick : C.border,
                        color: m.status === "upcoming" ? C.muted : "#fff",
                      }}>{m.status === "complete" ? "✓" : m.status === "active" ? "→" : m.id}</div>
                      <div style={{ flex: 1, fontSize: 12.5, fontWeight: m.status === "active" ? 700 : 400, color: m.status === "upcoming" ? C.muted : C.text }}>{m.label}</div>
                      <Pill status={m.status} />
                    </div>
                  ))}
                </div>
                <div style={{ background: C.card, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, textTransform: "uppercase", letterSpacing: 1 }}>Ramp Velocity</div>
                  <div style={{ fontSize: 11, color: C.muted, marginBottom: 12 }}>Priya's score vs. Q1 2026 cohort average</div>
                  <ResponsiveContainer width="100%" height={220}>
                    <LineChart data={rampData}>
                      <XAxis dataKey="week" tick={{ fill: C.muted, fontSize: 11 }} axisLine={{ stroke: C.border }} />
                      <YAxis tick={{ fill: C.muted, fontSize: 11 }} axisLine={{ stroke: C.border }} domain={[0, 100]} />
                      <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text }} />
                      <Line type="monotone" dataKey="score" stroke={C.brick} strokeWidth={2.5} dot={{ fill: C.brick, r: 4 }} name="Priya" />
                      <Line type="monotone" dataKey="avg" stroke={C.muted} strokeWidth={1.5} strokeDasharray="5 5" dot={false} name="Cohort Avg" />
                    </LineChart>
                  </ResponsiveContainer>
                  <div style={{ fontSize: 11, color: C.green, marginTop: 8, fontWeight: 600 }}>↑ Tracking 20% above cohort average at Day 14</div>
                </div>
              </div>
            )}

            {/* Skills Tab */}
            {tab === "skills" && (
              <div style={{ background: C.card, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Skills Gap Analysis</div>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 16 }}>Current proficiency vs. Day 60 target. Red = gap the Copilot is addressing.</div>
                <ResponsiveContainer width="100%" height={260}>
                  <BarChart data={skills} layout="vertical" margin={{ left: 110 }}>
                    <XAxis type="number" domain={[0, 100]} tick={{ fill: C.muted, fontSize: 11 }} axisLine={{ stroke: C.border }} />
                    <YAxis type="category" dataKey="name" tick={{ fill: C.text, fontSize: 12 }} axisLine={false} width={110} />
                    <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text }} />
                    <Bar dataKey="score" radius={[0, 4, 4, 0]} name="Current">
                      {skills.map((s, i) => (
                        <Cell key={i} fill={s.score >= s.target ? C.green : s.score >= s.target * 0.7 ? C.yellow : C.brick} />
                      ))}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                <div style={{ display: "flex", gap: 20, marginTop: 12, fontSize: 11 }}>
                  <span><span style={{ color: C.green }}>●</span> On Track</span>
                  <span><span style={{ color: C.yellow }}>●</span> Developing</span>
                  <span><span style={{ color: C.brick }}>●</span> Gap — Copilot Active</span>
                </div>
              </div>
            )}

            {/* Copilot Tab */}
            {tab === "copilot" && (
              <div>
                <div style={{ background: C.card, borderRadius: 12, padding: 16, border: `1px solid ${C.border}`, marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ fontSize: 24 }}>🤖</div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>Copilot Summary — Day 14</div>
                    <div style={{ fontSize: 11.5, color: C.muted, marginTop: 2 }}>Priya is ramping above average but has two skills gaps needing attention before Day 60. 4 actions prioritized based on role requirements, team context, and what worked for similar new hires.</div>
                  </div>
                </div>
                {recs.map(r => (
                  <div key={r.id} onClick={() => setExp(exp === r.id ? null : r.id)} style={{
                    background: C.card, borderRadius: 10, padding: "14px 18px", border: `1px solid ${exp === r.id ? C.brick : C.border}`,
                    marginBottom: 10, cursor: "pointer", transition: "border-color 0.2s",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 20 }}>{r.icon}</span>
                      <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 8 }}>
                        <Dot l={r.urgency} />
                        <span style={{ fontSize: 13, fontWeight: 600 }}>{r.title}</span>
                      </div>
                      <span style={{ fontSize: 18, color: C.muted, transform: exp === r.id ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", display: "inline-block" }}>▾</span>
                    </div>
                    {exp === r.id && (
                      <div style={{ marginTop: 10, padding: "10px 14px", background: "rgba(238,61,44,0.05)", borderRadius: 8, fontSize: 12, color: C.muted, lineHeight: 1.6 }}>
                        <strong style={{ color: C.text }}>Why this recommendation:</strong> {r.reason}
                        <div style={{ marginTop: 10 }}>
                          <button style={{ background: C.brick, color: "#fff", border: "none", padding: "6px 16px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", marginRight: 8 }}>
                            {r.type === "learning" ? "Start Learning" : r.type === "connection" ? "Schedule Intro" : "View Issues"}
                          </button>
                          <button style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, padding: "6px 16px", borderRadius: 6, fontSize: 11, cursor: "pointer" }}>Dismiss</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 32, padding: "16px 0", borderTop: `1px solid ${C.border}`, fontSize: 11, color: C.muted }}>
              <strong>Brickster Learning Copilot</strong> — Prototype by Helena Cohee | <a href="https://helenacohee.github.io/portfolio/" style={{ color: C.blue, textDecoration: "none" }}>Portfolio</a> | Built to demonstrate AI-enabled talent development at Databricks
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
